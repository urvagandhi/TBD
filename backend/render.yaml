services:
  - type: web
    name: agent-paperpal-backend
    runtime: python
    rootDir: .
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MAX_TOKENS
        value: "65536"
      - key: GEMINI_THINKING_BUDGET
        value: "16384"
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_TIMEOUT
        value: "120"
      - key: LLM_MAX_RETRIES
        value: "3"
